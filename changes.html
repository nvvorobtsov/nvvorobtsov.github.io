<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest changes — Nick Vorobtsov</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #fbbf24;
            --accent-blue: #38bdf8;
            --card-bg: #1e293b;
            --border-color: #334155;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.65;
            margin: 0;
            padding: 0;
        }
        body.en .lang-ru { display: none !important; }
        body.ru .lang-en { display: none !important; }
        .lang-toggle {
            color-scheme: light;
            position: fixed;
            top: max(12px, env(safe-area-inset-top, 0px));
            right: max(12px, env(safe-area-inset-right, 0px));
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            display: flex;
            overflow: hidden;
            z-index: 10000;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
        }
        .lang-btn {
            margin: 0;
            padding: 12px 18px;
            min-width: 48px;
            min-height: 48px;
            box-sizing: border-box;
            font-size: 0.9rem;
            font-weight: 600;
            font-family: inherit;
            line-height: 1.2;
            color: var(--text-muted);
            background: transparent;
            border: none;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-appearance: none;
            appearance: none;
            -webkit-tap-highlight-color: rgba(245, 158, 11, 0.45);
            transition: background 0.2s ease, color 0.2s ease;
        }
        .lang-btn:focus-visible { outline: 2px solid #f59e0b; outline-offset: 2px; }
        .lang-btn.active {
            background: #f59e0b !important;
            color: #0f172a !important;
            font-weight: 700;
        }
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 48px 20px 60px;
            box-sizing: border-box;
        }

        @media (min-width: 900px) {
            .container {
                max-width: min(1800px, 94vw);
            }
        }
        .back-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 28px;
        }
        .back-link:hover { text-decoration: underline; }
        h1 {
            font-size: 1.85rem;
            font-weight: 800;
            margin: 0 0 8px;
            color: var(--text-main);
        }
        .lead {
            color: var(--text-muted);
            font-size: 0.98rem;
            margin: 0 0 28px;
        }
        .changelog-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 28px 28px 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .changelog-list {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        .changelog-item {
            margin: 0 0 24px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        .changelog-item:last-child {
            border-bottom: none;
            padding-bottom: 16px;
            margin-bottom: 0;
        }
        .changelog-date {
            font-family: 'Fira Code', monospace;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--accent-gold);
            letter-spacing: 0.02em;
            margin-bottom: 10px;
        }
        .changelog-text {
            margin: 0;
            color: var(--text-main);
            font-size: 1.02rem;
        }
        .changelog-text em {
            font-style: normal;
            color: var(--accent-blue);
            font-weight: 500;
        }
        #changelog-error {
            color: #f87171;
            font-size: 0.95rem;
            display: none;
            margin-bottom: 16px;
        }
        #changelog-error.visible { display: block; }

        .changelog-link-wrap {
            margin: 14px 0 0;
        }

        .changelog-jump-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            background: rgba(56, 189, 248, 0.14);
            color: var(--accent-blue);
            border: 1px solid rgba(56, 189, 248, 0.4);
            transition: background 0.15s ease, border-color 0.15s ease;
        }

        .changelog-jump-link:hover {
            background: rgba(56, 189, 248, 0.24);
            border-color: var(--accent-blue);
        }

        .changelog-jump-link::after {
            content: "\2192";
            font-size: 1rem;
            opacity: 0.85;
        }
    </style>
</head>
<body class="en">

<div class="lang-toggle" role="group" aria-label="Language">
    <button type="button" class="lang-btn active" id="btn-en" aria-pressed="true" onclick="setLanguage('en')">EN</button>
    <button type="button" class="lang-btn" id="btn-ru" aria-pressed="false" onclick="setLanguage('ru')">RU</button>
</div>

<div class="container">
    <a href="index.html" class="back-link">&larr; <span class="lang-en">Back to home</span><span class="lang-ru">На главную</span></a>

    <h1><span class="lang-en">Latest changes</span><span class="lang-ru">Последние изменения</span></h1>
    <p class="lead">
        <span class="lang-en">What’s new on this site.</span>
        <span class="lang-ru">Что нового на сайте.</span>
    </p>

    <div class="changelog-card">
        <p id="changelog-error" role="alert"></p>
        <ul class="changelog-list" id="changelog-root"></ul>
    </div>
</div>

<script type="application/json" id="changelog-embedded">{"entries":[{"date":"2026-04-11","ru":"публикация 06: рукопись v5 на Zenodo (DOI 10.5281/zenodo.19533934); publication6.html и кнопка Zenodo на главной ведут на новую запись; предыдущая версия записи (v4): 10.5281/zenodo.19498770. Обновлён Readme в папке Publication 06.","en":"Publication 06: manuscript v5 on Zenodo (DOI 10.5281/zenodo.19533934); publication6.html and the main-page Zenodo button point to the new record; previous record (v4): 10.5281/zenodo.19498770. Readme updated in the Publication 06 folder.","link":{"href":"publication6.html?count=pub6_zenodo","en":"Publication 6 cover + Zenodo","ru":"Публикация 6 — обложка и Zenodo"}},{"date":"2026-04-11","ru":"расширенные GUI decompose_gui_EXT / decompose_gui_EXT_EN: условие на b₀ для параметрической формы расширено — помимо «все девятки» допускается однородная «середина» записи (только 0 или только 9); три пробы b₀ для интерполяции по x = 10⁷, 10⁶, 10⁵ задаёт parametric_probe_b0_triple (классика 10ⁿ−1 или маска, напр. 192 → 1999992, 199992, 19992). Скрипт scan_parametric_pte.py в экспериментах: опция --b0-template для того же правила. На сайте обновлены sources/ и packaging/decompose_gui_EXT_windows/; пересобран sources/decompose_gui_EXT_windows.zip; англоязычная версия GUI синхронизирована и переведена.","en":"Extended GUIs decompose_gui_EXT / decompose_gui_EXT_EN: the b₀ rule for parametric mode is broader — besides “all nines”, a uniform decimal “middle” (only 0 or only 9) is allowed; three b₀ probes for interpolation at x = 10⁷, 10⁶, 10⁵ come from parametric_probe_b0_triple (classic 10ⁿ−1 or a mask, e.g. 192 → 1999992, 199992, 19992). Experiments script scan_parametric_pte.py: --b0-template follows the same rule. Site: updated sources/ and packaging/decompose_gui_EXT_windows/; rebuilt sources/decompose_gui_EXT_windows.zip; English GUI synced and translated."},{"date":"2026-04-11","ru":"расширенные GUI decompose_gui_EXT / decompose_gui_EXT_EN: та же переразметка, что в экспериментальной ветке — поля и галочки над PanedWindow; шов между блоком «Макс. членов…»/«Примеры» (Canvas + inner_split) и кнопками с результатом; старт шва через sash_place; режим «только число» по состоянию чекбокса; кнопка «≡» — одна строка тождества между === без заголовков дефакторизации и без хвоста таблиц. Обновлены sources/ и packaging/decompose_gui_EXT_windows/.","en":"Extended GUIs decompose_gui_EXT / decompose_gui_EXT_EN: same layout as the experimental branch — inputs and checkboxes above the PanedWindow; sash between the max-terms/examples block (Canvas + inner_split) and the button/result area; sash placement via sash_place; “term count only” from checkbox widget state; the “≡” button copies one identity line between === without defactorization headings or table tails. Updated sources/ and packaging/decompose_gui_EXT_windows/."},{"date":"2026-04-11","ru":"расширенная GUI decompose_gui_EXT / decompose_gui_EXT_EN: после строки с инвариантным P(x) — опциональная таблица факторов коэффициентов P и режим «факторы по колонкам» (как у таблицы оснований). Страница changes.html: на широких экранах основная колонка контента примерно в 2,5 раза шире (max-width 1800px). Обновлены sources/ и packaging/decompose_gui_EXT_windows/.","en":"Extended GUIs decompose_gui_EXT / decompose_gui_EXT_EN: after the invariant P(x) line, optional factor table for coefficients of P and “factors in table columns” mode (like the reduced bases table). changes.html: on wide viewports the main content column is ~2.5× wider (max-width 1800px). Updated sources/ and packaging/decompose_gui_EXT_windows/."},{"date":"2026-04-11","ru":"публикация 06: рукопись v4 на Zenodo (DOI 10.5281/zenodo.19498770); обложка publication6.html — v4 (§4, уточнение «изолированности», новый заголовок); кнопка Zenodo на главной ведёт на новую версию записи.","en":"Publication 06: manuscript v4 on Zenodo (DOI 10.5281/zenodo.19498770); publication6.html cover updated to v4 (§4, clarified “isolated” wording, new title); main-page Zenodo button points to the new record version."},{"date":"2026-04-10","ru":"публикация 06: расширенная GUI decompose_gui_EXT (и decompose_gui_EXT_EN) — параметрическая форма (квадратики в x, P(x), опциональное авто-дополнение к блоку кубов). На главной и в подвале publication6.html — прямое скачивание decompose_gui_EXT_windows.zip; в каталоге sources/ лежат исходники .py и архив; добавлен счётчик pub6_ext_zip.","en":"Publication 06: extended GUI decompose_gui_EXT (and decompose_gui_EXT_EN) with parametric mode (quadratics in x, P(x), optional auto-append to the cube block). The home page and publication6.html footer offer a direct download of decompose_gui_EXT_windows.zip; sources/ holds the .py files and the zip; hit counter pub6_ext_zip added."},{"date":"2026-04-10","ru":"главная: добавлена публикация 06 (кубическая PTE), колонки перестроены — слева 6–4, справа 3–1; интерактивная двуязычная обложка publication6.html; Zenodo 10.5281/zenodo.19490895; счётчики pub6_cover и pub6_zenodo.","en":"Home: added publication 06 (cubic PTE), columns rebalanced (left 6–4, right 3–1); bilingual interactive cover publication6.html; Zenodo 10.5281/zenodo.19490895; hit counters pub6_cover and pub6_zenodo.","link":{"href":"publication6.html?count=pub6_cover","en":"Open publication 6 cover","ru":"Обложка публикации 6"}},{"date":"2026-04-05","ru":"программа decompose_gui (публ. 05): опциональный блок полной факторизации сокращённого тождества после дефакторизации; таблица оснований — выравнивание столбца «Основание» вправо, опция разнести множители по колонкам, горизонтальная прокрутка области результата; строки с простым основанием в таблице подсвечиваются синим и жирным. Обновлены исходники в sources/, встроенные листинги на code5.html и архив decompose_gui_windows.zip; синхронизирована англоязычная версия GUI.","en":"decompose_gui (pub. 05): optional full factorization of the reduced identity after defactorization; bases table — right-aligned base column, optional factors in separate columns, horizontal scrolling for the output pane; rows with a prime base are blue bold. Updated sources/, embedded listings in code5.html, decompose_gui_windows.zip, and the English GUI.","link":{"href":"code5.html?count=pub5_code#prog-gui","en":"Go to the code page — GUI program","ru":"Перейти к странице кода — программа с окном"}},{"date":"2026-04-05","ru":"вторая программа к публикации 05 (окно decompose_gui): добавлена проверка дефакторизации по общему НОД оснований кубов — в окне «Результат» при включённой опции (по умолчанию включена) выводятся куб НОД (g³) с факторизацией, факторизация сокращённой суммы N и сокращённое тождество; если НОД>1, громоздкое «сырое» разложение скрывается. Обновлены файлы на странице исходного кода и пакет для скачивания.","en":"Publication 05’s second program (decompose_gui): added a defactorization check using the gcd of all cube bases — with the option enabled (default on), the Result pane shows the cubed gcd (g³) with its factorization, the factorization of the reduced cube-sum N, and the reduced identity; when gcd>1, the bulky raw expansion is omitted. Source files on the code page and the downloadable package were updated.","link":{"href":"code5.html?count=pub5_code#prog-gui","en":"Go to the code page — GUI program","ru":"Перейти к странице кода — программа с окном"}},{"date":"2026-04-02","ru":"на странице с кодом к публикации 05 добавлена вторая программа (decompose_gui) с графическим окном и пример её вида: по числам a, начальному b и числу шагов k она считает телескопическое разложение в кубах и показывает результат в окне (можно смотреть только число членов или полный текст разложения).","en":"On the source-code page for publication 05, a second program (decompose_gui) was added with a graphical window and a sample view: given a, starting b, and the number of steps k, it computes the telescopic cube decomposition and shows the result in the window (you can show only the term count or the full expansion).","link":{"href":"code5.html?count=pub5_code#prog-gui","en":"Go to the code page — GUI program","ru":"Перейти к странице кода — программа с окном"}}]}</script>

<script>
(function () {
    var root = document.getElementById('changelog-root');
    var errEl = document.getElementById('changelog-error');
    var changelogData = null;

    function escapeHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    function renderList() {
        if (!changelogData || !root) return;
        var lang = document.body.classList.contains('ru') ? 'ru' : 'en';
        var entries = changelogData.entries || [];
        root.innerHTML = '';
        entries.forEach(function (item) {
            var text = item[lang] || item.en || item.ru || '';
            var li = document.createElement('li');
            li.className = 'changelog-item';
            var dateEl = document.createElement('div');
            dateEl.className = 'changelog-date';
            dateEl.textContent = item.date || '';
            var p = document.createElement('p');
            p.className = 'changelog-text';
            p.innerHTML = '— ' + escapeHtml(text);
            li.appendChild(dateEl);
            li.appendChild(p);
            if (item.link && item.link.href) {
                var wrap = document.createElement('p');
                wrap.className = 'changelog-link-wrap';
                var a = document.createElement('a');
                a.href = item.link.href;
                a.className = 'changelog-jump-link';
                a.textContent = item.link[lang] || item.link.en || item.link.ru || '';
                wrap.appendChild(a);
                li.appendChild(wrap);
            }
            root.appendChild(li);
        });
    }

    function loadEmbedded() {
        var el = document.getElementById('changelog-embedded');
        if (!el || !el.textContent) return null;
        try {
            return JSON.parse(el.textContent.trim());
        } catch (e) {
            return null;
        }
    }

    function showError(msg) {
        errEl.textContent = msg;
        errEl.classList.add('visible');
    }

    function clearError() {
        errEl.classList.remove('visible');
        errEl.textContent = '';
    }

    window.setLanguage = function (lang) {
        document.body.className = lang;
        localStorage.setItem('preferredLang', lang);
        var btnRu = document.getElementById('btn-ru');
        var btnEn = document.getElementById('btn-en');
        if (btnRu && btnEn) {
            if (lang === 'ru') {
                btnRu.classList.add('active');
                btnEn.classList.remove('active');
                btnRu.setAttribute('aria-pressed', 'true');
                btnEn.setAttribute('aria-pressed', 'false');
                document.documentElement.lang = 'ru';
            } else {
                btnEn.classList.add('active');
                btnRu.classList.remove('active');
                btnEn.setAttribute('aria-pressed', 'true');
                btnRu.setAttribute('aria-pressed', 'false');
                document.documentElement.lang = 'en';
            }
        }
        renderList();
    };

    function loadChangelog() {
        fetch('data/changelog.json', { cache: 'no-store' })
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (data) {
                changelogData = data;
                clearError();
                renderList();
            })
            .catch(function () {
                var embedded = loadEmbedded();
                if (embedded && embedded.entries && embedded.entries.length) {
                    changelogData = embedded;
                    clearError();
                    renderList();
                } else {
                    showError(document.body.classList.contains('ru')
                        ? 'Не удалось загрузить список изменений.'
                        : 'Could not load the changelog.');
                }
            });
    }

    window.addEventListener('DOMContentLoaded', function () {
        loadChangelog();
        var saved = localStorage.getItem('preferredLang') || 'en';
        setLanguage(saved);
    });

    window.addEventListener('pageshow', function () {
        var saved = localStorage.getItem('preferredLang') || 'en';
        setLanguage(saved);
    });
})();
</script>
</body>
</html>
